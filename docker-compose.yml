services:
  # ─── Forms Backend ──────────────────────────────────────────────────────────
  forms-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn forms_backend.wsgi:application --bind 0.0.0.0:8000 --workers 3 --reload"
    environment:
      - DATABASE_URL=postgresql://forms:forms@db:5432/forms
      - DOCS_API_URL=http://impress:8000/api/v1.0
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
      - DEBUG=${DEBUG:-True}
      - ALLOWED_HOSTS=localhost,127.0.0.1,forms-backend
      - CORS_ALLOWED_ORIGINS=http://localhost:3001
    depends_on:
      - db
    networks:
      - forms-internal
      - lasuite
    ports:
      - "8082:8000"
    volumes:
      - ./backend:/app

  # ─── Forms Frontend ─────────────────────────────────────────────────────────
  forms-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - NEXT_PUBLIC_DOCS_API_URL=http://localhost:8082/api/v1.0
      - NEXT_PUBLIC_FORMS_API_URL=http://localhost:8082
      - NEXT_PUBLIC_APP_URL=http://localhost:3001
      - NEXT_PUBLIC_KEYCLOAK_URL=http://localhost:8083
      - NEXT_PUBLIC_OIDC_CLIENT_ID=impress
      - NEXT_PUBLIC_OIDC_CLIENT_SECRET=ThisIsAnExampleKeyForDevPurposeOnly
    depends_on:
      - forms-backend
    networks:
      - forms-internal
    ports:
      - "3001:3001"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

  # ─── PostgreSQL (forms) ─────────────────────────────────────────────────────
  # Port 5434 pour éviter le conflit avec kc_postgresql de docs (5433)
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: forms
      POSTGRES_USER: forms
      POSTGRES_PASSWORD: forms
    volumes:
      - forms_db_data:/var/lib/postgresql/data
    networks:
      - forms-internal
    ports:
      - "5434:5432"

# ─── Réseaux ─────────────────────────────────────────────────────────────────
networks:
  forms-internal:
    driver: bridge
  lasuite:
    external: true
    name: lasuite-network

volumes:
  forms_db_data:
